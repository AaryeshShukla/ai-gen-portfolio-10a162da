<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, hsl(210, 50%, 20%), hsl(210, 50%, 30%));
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }
        .slider {
            display: flex;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .slide {
            min-width: 100%;
            transition: transform 0.5s ease;
        }
        .color-picker, .specs {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .color-option:hover {
            transform: scale(1.1);
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .review-section {
            margin: 20px 0;
        }
        .review {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .stars {
            color: gold;
            margin-right: 10px;
        }
        .checkout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .cart-count {
            background: hsl(120, 70%, 40%);
            border-radius: 12px;
            padding: 5px 10px;
            color: white;
        }
        .checkout-button {
            background: hsl(240, 70%, 50%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .checkout-button:hover {
            background: hsl(240, 70%, 60%);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Product Showcase</h1>
        <div class="slider">
            <div class="slide"><img src="https://images.unsplash.com/photo-1517841905240-4729888e3b3e" alt="Product 1" style="width:100%; border-radius: 24px;"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0" alt="Product 2" style="width:100%; border-radius: 24px;"></div>
        </div>
        <div class="color-picker">
            <div class="color-option" style="background: #ff5733;"></div>
            <div class="color-option" style="background: #33ff57;"></div>
            <div class="color-option" style="background: #3357ff;"></div>
        </div>
        <div class="specs-grid">
            <div><strong>Weight:</strong> 1.5kg</div>
            <div><strong>Dimensions:</strong> 10x10x10cm</div>
            <div><strong>Material:</strong> Plastic</div>
            <div><strong>Warranty:</strong> 2 years</div>
        </div>
        <div class="review-section">
            <h2>Customer Reviews</h2>
            <div class="review"><span class="stars">★★★★★</span> Great product!</div>
            <div class="review"><span class="stars">★★★★☆</span> Good value for money.</div>
        </div>
        <div class="checkout">
            <div class="cart-count">Items in Cart: <span id="cart-count">0</span></div>
            <button class="checkout-button" onclick="openModal()">Checkout</button>
        </div>
        <div class="modal" id="checkout-modal">
            <div class="modal-content">
                <h2>Checkout</h2>
                <p>Your total is $99.99</p>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
    <script>
        let cartCount = 0;
        function openModal() {
            document.getElementById('checkout-modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('checkout-modal').style.display = 'none';
        }
    </script>
</body>
</html>
